name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_BUNDLE_ID: io.github.dirstatrs.dirstatrs
  APP_NAME: Dirstat
  BINARY_NAME: dirstat-rs
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: verify / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            pkg-config

      - name: Install Rust toolchain and Clippy
        run: |
          rustup toolchain install --profile minimal
          rustup component add clippy

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cargo clippy --version

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo test --workspace

  package:
    name: package / ${{ matrix.platform }}
    needs: verify
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            formats: deb
          - platform: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            formats: nsis
          - platform: macos
            runner: macos-latest
            target: aarch64-apple-darwin
            formats: dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libasound2-dev \
            libgl1-mesa-dev \
            libgtk-3-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxrandr-dev \
            dpkg-dev \
            fakeroot \
            pkg-config

      - name: Install Windows packaging dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-ci-

      - name: Build release binary
        run: cargo build --workspace --release

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12:?APPLE_CERTIFICATE_P12 secret is required for macOS release signing}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD secret is required for macOS release signing}"
          : "${KEYCHAIN_PASSWORD:?KEYCHAIN_PASSWORD secret is required for macOS release signing}"

          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -n 1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in imported keychain" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure cargo-packager signing
        if: matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?macOS release signing identity was not imported}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          cat > Packager.toml <<PACKAGER
          product-name = "${APP_NAME}"
          version = "${VERSION}"
          identifier = "${APP_BUNDLE_ID}"
          description = "Cross-platform disk usage visualizer with 2D and 3D treemap rendering."
          homepage = "https://github.com/ssoj13/dirstat-rs"
          out-dir = "dist"
          binaries-dir = "target/release"
          resources = [{ src = "data", target = "data" }]

          [macos]
          minimum-system-version = "13.0"
          signing-identity = "${APPLE_SIGNING_IDENTITY}"
          PACKAGER

      - name: Package application
        run: cargo packager --release --formats ${{ matrix.formats }}

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID secret is required for notarization}"
          : "${APPLE_API_ISSUER_ID:?APPLE_API_ISSUER_ID secret is required for notarization}"
          : "${APPLE_API_KEY_P8:?APPLE_API_KEY_P8 secret is required for notarization}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID secret is required for notarization}"

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if ! printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$API_KEY_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_API_KEY_P8" | base64 -D > "$API_KEY_PATH"
          fi
          chmod 600 "$API_KEY_PATH"

          DMG_PATH=$(find dist -maxdepth 1 -name "*.dmg" -print -quit)
          : "${DMG_PATH:?cargo-packager did not produce a DMG}"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Generate checksums (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f ! -name "*.sha256" -print0 | while IFS= read -r -d '' file; do
            shasum -a 256 "$file" | sed "s#  dist/#  #" > "$file.sha256"
          done

      - name: Generate checksums (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -File |
            Where-Object { $_.Name -notlike '*.sha256' } |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256" -Encoding ascii
            }

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: |
            dist/*
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Attest package provenance
        uses: actions/attest@v4
        continue-on-error: true
        with:
          subject-path: |
            dist/*

      - name: Delete Apple signing keychain
        if: always() && matrix.platform == 'macos' && env.APPLE_KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$APPLE_KEYCHAIN_PATH" || true

  release:
    name: github release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: package-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -print | sort
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --verify-tag --generate-notes --title "$TAG_NAME"
          fi
