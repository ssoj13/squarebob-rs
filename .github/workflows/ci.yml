name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: Build installable packages after verification
        required: false
        default: false
        type: boolean
      package_platform:
        description: Platform to package when package=true
        required: false
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_BUNDLE_ID: io.github.dirstatrs.dirstatrs
  APP_NAME: Dirstat
  BINARY_NAME: dirstat-rs
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: verify / ${{ matrix.platform }}
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.package != true }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            triplet: x64-linux-release
          - platform: windows
            runner: windows-latest
            triplet: x64-windows-static-md-release
          - platform: macos
            runner: macos-latest
            triplet: arm64-osx-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup native dependencies
        uses: ./.github/actions/setup-native-deps
        with:
          platform: ${{ matrix.platform }}
          triplet: ${{ matrix.triplet }}

      - name: Install Rust toolchain and Clippy
        shell: bash
        run: |
          set -euo pipefail
          # rustup 1.28+ is strict about component flags; install channel + clippy in one shot.
          channel=$(grep '^channel' rust-toolchain.toml | tr -d '\r' | sed -E 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          rustup toolchain install "$channel" --profile minimal --component clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo
          cache-all-crates: true

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          cargo clippy --version

      - name: Clippy workspace
        run: cargo run -p xtask -- clippy --workspace --all-targets -- -D warnings

      - name: Test workspace
        run: cargo run -p xtask -- test --debug

  package-plan:
    name: package plan
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.plan.outputs.enabled }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Choose package matrix
        id: plan
        shell: bash
        env:
          PACKAGE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.package || 'false' }}
          PLATFORM_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.package_platform || 'all' }}
        run: |
          set -euo pipefail

          enabled=false
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            enabled=true
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$PACKAGE_INPUT" == "true" ]]; then
            enabled=true
          fi

          case "$PLATFORM_INPUT" in
            linux)
              matrix='{"include":[{"platform":"linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","formats":"deb","triplet":"x64-linux-release"}]}'
              ;;
            windows)
              matrix='{"include":[{"platform":"windows","runner":"windows-latest","target":"x86_64-pc-windows-msvc","formats":"nsis","triplet":"x64-windows-static-md-release"}]}'
              ;;
            macos)
              matrix='{"include":[{"platform":"macos","runner":"macos-latest","target":"aarch64-apple-darwin","formats":"app","triplet":"arm64-osx-release"}]}'
              ;;
            *)
              matrix='{"include":[{"platform":"linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","formats":"deb","triplet":"x64-linux-release"},{"platform":"windows","runner":"windows-latest","target":"x86_64-pc-windows-msvc","formats":"nsis","triplet":"x64-windows-static-md-release"},{"platform":"macos","runner":"macos-latest","target":"aarch64-apple-darwin","formats":"app","triplet":"arm64-osx-release"}]}'
              ;;
          esac

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  package:
    name: package / ${{ matrix.platform }}
    needs: package-plan
    if: needs.package-plan.outputs.enabled == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      attestations: write
      artifact-metadata: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.package-plan.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup native dependencies
        uses: ./.github/actions/setup-native-deps
        with:
          platform: ${{ matrix.platform }}
          triplet: ${{ matrix.triplet }}
          packaging: "true"

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel=$(grep '^channel' rust-toolchain.toml | tr -d '\r' | sed -E 's/^channel[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          rustup toolchain install "$channel" --profile minimal

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo
          cache-all-crates: true

      - name: Build release binary
        run: cargo run -p xtask -- build --release

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Import Apple Developer ID certificate
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          : "${APPLE_CERTIFICATE_P12:?APPLE_CERTIFICATE_P12 secret is required for macOS release signing}"
          : "${APPLE_CERTIFICATE_PASSWORD:?APPLE_CERTIFICATE_PASSWORD secret is required for macOS release signing}"

          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -n 1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in imported keychain" >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure cargo-packager signing
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?macOS release signing identity was not imported}"
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          cat > Packager.toml <<PACKAGER
          product-name = "${APP_NAME}"
          version = "${VERSION}"
          identifier = "${APP_BUNDLE_ID}"
          description = "Cross-platform disk usage visualizer with 2D and 3D treemap rendering."
          homepage = "https://github.com/ssoj13/dirstat-rs"
          out-dir = "dist"
          binaries-dir = "target/release"
          resources = [{ src = "data", target = "data" }]

          [macos]
          minimum-system-version = "13.0"
          signing-identity = "${APPLE_SIGNING_IDENTITY}"
          PACKAGER

      - name: Package application
        run: cargo packager --release --formats ${{ matrix.formats }}

      - name: Sign and package macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          : "${APPLE_SIGNING_IDENTITY:?macOS release signing identity was not imported}"
          : "${APPLE_KEYCHAIN_PATH:?macOS signing keychain path is required}"

          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          ARCH=$(uname -m)
          APP_PATH="dist/${APP_NAME}.app"
          DMG_PATH="dist/${APP_NAME}_${VERSION}_${ARCH}.dmg"
          DMG_ROOT="$RUNNER_TEMP/dmg-root"

          test -d "$APP_PATH"
          codesign --force --deep --options runtime --timestamp \
            --keychain "$APPLE_KEYCHAIN_PATH" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          rm -f dist/*.dmg
          rm -rf "$DMG_ROOT"
          mkdir -p "$DMG_ROOT"
          ditto "$APP_PATH" "$DMG_ROOT/${APP_NAME}.app"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          codesign --force --timestamp \
            --keychain "$APPLE_KEYCHAIN_PATH" \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_API_KEY_ID:?APPLE_API_KEY_ID secret is required for notarization}"
          : "${APPLE_API_ISSUER_ID:?APPLE_API_ISSUER_ID secret is required for notarization}"
          : "${APPLE_API_KEY_P8:?APPLE_API_KEY_P8 secret is required for notarization}"
          : "${APPLE_TEAM_ID:?APPLE_TEAM_ID secret is required for notarization}"

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if ! printf '%s' "$APPLE_API_KEY_P8" | base64 --decode > "$API_KEY_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_API_KEY_P8" | base64 -D > "$API_KEY_PATH"
          fi
          chmod 600 "$API_KEY_PATH"

          DMG_PATH=$(find dist -maxdepth 1 -name "*.dmg" -print -quit)
          : "${DMG_PATH:?macOS DMG was not produced}"
          SUBMISSION_JSON="$RUNNER_TEMP/notary-submit.json"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --output-format json | tee "$SUBMISSION_JSON"

          SUBMISSION_ID=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("id", ""))' "$SUBMISSION_JSON")
          STATUS=$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1])).get("status", ""))' "$SUBMISSION_JSON")
          if [ -n "$SUBMISSION_ID" ]; then
            echo "::group::Apple notarization log"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" || true
            echo "::endgroup::"
          fi
          if [ "$STATUS" != "Accepted" ]; then
            echo "Apple notarization failed with status: $STATUS" >&2
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Generate checksums (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          find dist -maxdepth 1 -type f ! -name "*.sha256" -print0 | while IFS= read -r -d '' file; do
            shasum -a 256 "$file" | sed "s#  dist/#  #" > "$file.sha256"
          done

      - name: Generate checksums (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -File |
            Where-Object { $_.Name -notlike '*.sha256' } |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)" | Set-Content -Path "$($_.FullName).sha256" -Encoding ascii
            }

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: |
            dist/*
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Attest package provenance
        uses: actions/attest@v4
        continue-on-error: true
        with:
          subject-path: |
            dist/*

      - name: Delete Apple signing keychain
        if: always() && matrix.platform == 'macos' && env.APPLE_KEYCHAIN_PATH != ''
        shell: bash
        run: security delete-keychain "$APPLE_KEYCHAIN_PATH" || true

  release:
    name: github release
    needs:
      - verify
      - package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: package-*
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          find release-assets -maxdepth 1 -type f -print | sort
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --verify-tag --generate-notes --title "$TAG_NAME"
          fi
